name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run tests
        run: python3 -m unittest discover -s tests -v

      - name: Smoke test Python CLI
        run: |
          python3 scripts/manifest_tool.py uuid --count 1
          python3 scripts/manifest_tool.py transition pending in_progress
          python3 scripts/manifest_tool.py schema plan > /dev/null
          python3 scripts/manifest_tool.py schema node > /dev/null
