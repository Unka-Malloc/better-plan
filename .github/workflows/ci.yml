name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            python-version: "3.8"
          - os: ubuntu-latest
            python-version: "3.8"
          - os: ubuntu-latest
            python-version: "3.x"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Smoke test Python CLI
        run: |
          python scripts/manifest_tool.py uuid --count 1
          python scripts/manifest_tool.py transition pending in_progress
          python scripts/manifest_tool.py schema plan
          python scripts/manifest_tool.py schema node
